name: Record Golden Images

# テストの基準画像(ゴールデン)を CI 上で記録し、実行ブランチにコミットする。
# ローカル環境差(フォント・Skia)の影響を受けないよう、基準画像は必ず
# この CI(Linux ランナー)で生成する。
#
# 使いどころ:
#   - テスト基盤導入後の初回記録
#   - 意図した UI/マスキング変更で基準画像を更新するとき
# 実行後、android.yml の "Run unit & golden tests" が新基準との比較になる。

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Record golden images
        run: ./gradlew :app:recordRoborazziProDebug -PupdateGoldens=true --no-daemon --stacktrace

      - name: Commit recorded goldens to this branch
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/test/goldens android/app/src/test/screenshots
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
          else
            git commit -m "test: record golden images (record-goldens workflow)"
            git push
          fi
